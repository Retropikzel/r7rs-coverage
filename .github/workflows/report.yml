name: r7rs-compability-report

on:
  push:
    branches:
      - 'master'
  schedule:
    - cron: "17 4 * * 2"

jobs:
  report:
    runs-on: ubuntu-22.04
    container:
      image: schemers/chibi:head
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup
        run: |
          apt-get update
          apt-get install -y make gcc libffi-dev docker.io gauche
          snow-chibi install --impls=chibi retropikzel.compile-r7rs
          mkdir -p ${HOME}/.snow && echo '()' > ${HOME}/.snow/config.scm
      - name: Report
        run: |
          make SCHEME=gauche test-docker
          ls && make report
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: results/*.csv
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: report
          path: index.html