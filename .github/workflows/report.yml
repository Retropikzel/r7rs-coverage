name: r7rs-compability-report

on:
  push:
    branches:
      - 'master'
  schedule:
    - cron: "17 4 * * 2"

jobs:
  Tests:
    strategy:
      matrix:
        scheme: [chicken]
    runs-on: ubuntu-22.04
    container:
      image: debian
    steps:
      - uses: actions/cache@v4
        with:
          path: ${{ github.workspace}}/results
          key: results
          restore-keys: results
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup
        run: apt-get update && apt-get install -y make docker.io
      - name: Tests
        run: make CURRENT_DIR=${{github.workspace}} SCHEME=${{ matrix.scheme }} test-docker
  Report:
    runs-on: ubuntu-22.04
    needs: Tests
    container:
      image: schemers/gauche:head
    steps:
      - uses: actions/cache@v4
        with:
          path: ${{ github.workspace}}/results
          key: results
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup
        run: apt-get update && apt-get install -y make
      - name: Report
        run: make report
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: results/*.csv
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: report
          path: index.html