name: r7rs-compability-report

on:
  push:
    branches:
      - 'master'
  schedule:
    - cron: "17 4 * * 2"

jobs:
  report:
    runs-on: ubuntu-22.04
    container:
      image: schemers/chibi:head
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Setup
        run: |
          apt-get update
          apt-get install -y make gcc libffi-dev docker.io gauche
          snow-chibi install --impls=chibi retropikzel.compile-r7rs
      - name: Capyscheme
        run: make SCHEME=capyscheme test-docker
      - name: Chibi
        run: make SCHEME=chibi test-docker
      - name: Report
        run: make report
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: report
          path: index.html